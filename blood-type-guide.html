            background: #e2e3e5;
            border-left: 5px solid #6c757d;
        }

            margin-bottom: 10px;

        }

            color: #155724;
        }

            color: #721c24;

            line-height: 1.6;
            margin-bottom: 8px;

            color: #155724;
        }

            color: #721c24;
        }

        .result-card.neutral p {
            color: #383d41;
        }

            font-weight: bold;
            margin-top: 10px;
        }

            color: #999;
        }

            font-size: 48px;
            margin-bottom: 10px;
        }

            border-radius: 8px;

            border-left: 4px solid #667eea;

            color: #333;

    const bloodTypeDescriptions = {
        O: "Blood Type O: The \"Hunter\" - Thrives on high-protein, meat-based diets with plenty of vegetables and fruits.",
        A: "Blood Type A: The \"Cultivator\" - Does well with plant-based foods, fish, and grains.",
        B: "Blood Type B: The \"Nomad\" - Balanced diet with meats, dairy, grains, and vegetables.",
        AB: "Blood Type AB: The \"Enigma\" - Combination of A and B characteristics, thrives on a balanced diet."
    };

    let selectedBloodType = null;

    function selectBloodType(type) {
        selectedBloodType = type;
        
        // Update button states
        document.querySelectorAll('.blood-type-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.classList.add('active');

        // Show blood type info
        document.getElementById('bloodTypeInfo').innerHTML = bloodTypeDescriptions[type];
        document.getElementById('bloodTypeInfo').style.display = 'block';
        
        // Clear search
        document.getElementById('foodSearch').value = '';
        document.getElementById('resultsContainer').style.display = 'none';
        document.getElementById('foodListContainer').style.display = 'none';
        document.getElementById('emptyState').style.display = 'block';
    }

    function searchFood() {
        if (!selectedBloodType) {
            alert('Please select your blood type first!');
            return;
        }

        const searchTerm = document.getElementById('foodSearch').value.trim().toLowerCase();
        
        if (searchTerm === '') {
            alert('Please enter a food name!');
            return;
        }

        const beneficial = foodDatabase[selectedBloodType].beneficial;
        const avoid = foodDatabase[selectedBloodType].avoid;
        const neutral = foodDatabase[selectedBloodType].neutral;

        let beneficialMatch = beneficial.find(f => f.name.toLowerCase().includes(searchTerm));
        let avoidMatch = avoid.find(f => f.name.toLowerCase().includes(searchTerm));
        let neutralMatch = neutral.find(f => f.name.toLowerCase().includes(searchTerm));

        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('foodListContainer').style.display = 'none';
        document.getElementById('resultsContainer').style.display = 'grid';
        document.getElementById('resultsContainer').innerHTML = '';

        if (beneficialMatch) {
            addResultCard('beneficial', beneficialMatch.name, 'Excellent Choice! ✅', 
                `<strong>Why eat it:</strong> ${beneficialMatch.why}`);
        }

        if (avoidMatch) {
            addResultCard('avoid', avoidMatch.name, 'Avoid This! ❌', 
                `<strong>Why avoid it:</strong> ${avoidMatch.whyNot}`);
        }

        if (neutralMatch) {
            addResultCard('neutral', neutralMatch.name, 'Neutral - Okay ⚠️', 
                `This food is neutral for your blood type. It's safe to eat in moderation.`);
        }

        if (!beneficialMatch && !avoidMatch && !neutralMatch) {
            document.getElementById('resultsContainer').style.display = 'none';
            document.getElementById('emptyState').innerHTML = `
                <div class="empty-state-icon">🔍</div>
                <p>Food not found in database. Try searching for another food!</p>
            `;
            document.getElementById('emptyState').style.display = 'block';
        }
    }

    function addResultCard(type, foodName, title, description) {
        const card = document.createElement('div');
        card.className = `result-card ${type}`;
        card.innerHTML = `
            <h3>${title}</h3>
            <p><strong>${foodName}</strong></p>
            <p>${description}</p>
        `;
        document.getElementById('resultsContainer').appendChild(card);
    }

    // Allow Enter key to search
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('foodSearch').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchFood();
            }
        });
    });
